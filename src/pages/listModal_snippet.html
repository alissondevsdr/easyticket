<!-- CLIENTES                                                           -->
<!-- ═══════════════════════════════════════════════════════════════════ -->
<div class="modal-list-client none" id="listModal">

  <div class="toolbar">
    <div class="search-wrap">
      <input type="text" class="search-input" id="searchClient"
        placeholder="Buscar por nome, CPF ou telefone...">
      <i class="search-icon fas fa-magnifying-glass"></i>
    </div>
    <button class="button-list" id="create">
      <i class="fas fa-user-plus"></i>
      Cadastrar
    </button>
  </div>

  <div class="adjust-table">
    <table class="table" id="tabelClient">
      <thead>
        <tr>
          <th>#</th>
          <th>Nome</th>
          <th>Telefone</th>
          <th>CPF</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="list"></tbody>
    </table>
  </div>

</div>
