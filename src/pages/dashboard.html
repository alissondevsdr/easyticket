<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>EasyTicket Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
  <link rel="stylesheet" href="../css/client.css">
  <link rel="stylesheet" href="../css/dashboard.css">
  <link rel="stylesheet" href="../css/login.css">
  <link rel="stylesheet" href="../css/modal.css">
  <link rel="stylesheet" href="../css/register.css">
  <link rel="stylesheet" href="../css/tickets.css">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://kit.fontawesome.com/a1729d9d21.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
</head>

<body>

  <!-- Modal global (confirmação / edição) -->
  <div class="modal" id="modal">
    <div class="modal-background"></div>
    <div class="modal-content" id="modalContentContainer"></div>
  </div>

  <div class="dashboard">

    <!-- ── Menu ──────────────────────────────────────────────────────────── -->
    <div class="tabs is-toggle is-toggle-rounded is-centered">
      <ul id="menu">
        <li><a>Cadastro</a></li>
        <li><a>Clientes</a></li>
        <li><a>Ingressos</a></li>
        <li><a class="fa-solid fa-right-from-bracket size"></a></li>
      </ul>
    </div>

    <!-- ── Boas-vindas ────────────────────────────────────────────────────── -->
    <h1 class="welcome" id="welcome">
      Bem vindo à <span class="detail">easy ticket</span>.
    </h1>

    <!-- ── Cadastro ───────────────────────────────────────────────────────── -->
    <div class="modal-client none" id="createModal">
      <div class="title-client">Cadastro de clientes</div>
      <form class="card-content" id="clientForm">
        <div class="field">
          <p class="control has-icons-left">
            <input class="input" type="text" placeholder="Nome" id="client" required>
            <span class="icon is-small is-left"><i class="fas fa-user"></i></span>
          </p>
        </div>
        <div class="field">
          <p class="control has-icons-left">
            <input class="input" type="text" placeholder="Telefone" id="phone" required>
            <span class="icon is-small is-left"><i class="fas fa-phone"></i></span>
          </p>
        </div>
        <div class="field">
          <p class="control has-icons-left">
            <input class="input" type="text" placeholder="CPF" id="cpf" required>
            <span class="icon is-small is-left"><i class="fas fa-address-card"></i></span>
          </p>
        </div>
        <div class="field">
          <p class="control">
            <button type="submit" class="button is-primary" id="createButton">Cadastrar</button>
          </p>
        </div>
      </form>
    </div>

    <!-- ── Clientes ───────────────────────────────────────────────────────── -->
    <div class="modal-list-client none" id="listModal">
      <div class="toolbar">
        <input type="text" class="input search-input" id="searchClient"
          placeholder="Buscar cliente por nome ou CPF">
        <button class="adjust is-primary button-list" id="create">Cadastrar</button>
      </div>
      <div class="adjust-table">
        <table class="table" id="tabelClient">
          <thead>
            <tr>
              <th>Código</th>
              <th>Nome</th>
              <th>Telefone</th>
              <th>CPF</th>
              <th>Funções</th>
            </tr>
          </thead>
          <tbody id="list"></tbody>
        </table>
      </div>
    </div>

    <!-- ── Ingressos / PDV ────────────────────────────────────────────────── -->
    <div class="modal-sales none" id="saleModal">

      <div class="dashboard-sales">
        <div class="item-dashboard">
          <span>Faturamento</span>
          <div class="value" id="metricRevenue">R$ 0,00</div>
        </div>
        <div class="item-dashboard">
          <span>Vendas</span>
          <div class="value" id="metricSales">0</div>
        </div>
        <div class="item-dashboard">
          <span>Ticket Médio</span>
          <div class="value" id="metricAvg">R$ 0,00</div>
        </div>
      </div>

      <div class="pdv">
        <h1>Venda</h1>

        <div class="inputs-sale">
          <select id="clientSelect" style="width:100%"></select>
          <input class="input value-ticket" type="text" placeholder="R$ 0,00" id="valueInput">
        </div>

        <div class="payments" id="payments">
          <div class="cash flex-column payments-items" id="cash">
            <i class="size2 cash fa-regular fa-money-bill-1"></i>
            <span class="cash">Dinheiro</span>
          </div>
          <div class="credit flex-column payments-items" id="credit">
            <i class="size2 fa-solid fa-credit-card credit"></i>
            <span class="credit">Crédito</span>
          </div>
          <div class="debit flex-column payments-items" id="debit">
            <i class="size2 fa-solid fa-credit-card debit"></i>
            <span class="debit">Débito</span>
          </div>
          <div class="pix flex-column payments-items" id="pix">
            <i class="size2 fa-solid fa-qrcode pix"></i>
            <span class="pix">PIX</span>
          </div>
        </div>

        <button class="button is-primary">Finalizar</button>
      </div>

    </div>
  </div><!-- /.dashboard -->

  <script type="module" src="../js/pages/menus.js"></script>
  <script type="module" src="../js/pages/createClient.js"></script>
  <script type="module" src="../js/utils/format.js"></script>
  <script type="module" src="../js/pages/listClient.js"></script>
  <script type="module" src="../js/utils/trigger.js"></script>
  <script type="module" src="../js/pages/alterClient.js"></script>
  <script type="module" src="../js/utils/search.js"></script>
  <script type="module" src="../js/pages/sales.js"></script>
</body>

</html>
